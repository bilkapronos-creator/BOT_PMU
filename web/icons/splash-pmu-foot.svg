<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 960" role="img" aria-label="Velora Engine  PMU et Football">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="540" y2="960" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="45%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#030712"/>
    </linearGradient>
    <linearGradient id="title" x1="80" y1="200" x2="460" y2="320">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="50%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="pmu" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="foot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="540" height="960" rx="32" fill="url(#bg)"/>
  <rect x="24" y="24" width="492" height="912" rx="24" fill="none" stroke="rgba(52,211,153,0.15)" stroke-width="2"/>
  <!-- Titre -->
  <text x="270" y="168" text-anchor="middle" fill="url(#title)" font-family="system-ui,Segoe UI,sans-serif" font-size="42" font-weight="900" letter-spacing="6">VELORA</text>
  <text x="270" y="218" text-anchor="middle" fill="#e5e7eb" font-family="system-ui,Segoe UI,sans-serif" font-size="22" font-weight="700" letter-spacing="12">ENGINE</text>
  <text x="270" y="268" text-anchor="middle" fill="#9ca3af" font-family="system-ui,Segoe UI,sans-serif" font-size="15" font-weight="600" letter-spacing="4">PMU · FOOTBALL</text>
  <!-- Carte PMU -->
  <g filter="url(#glow)">
    <rect x="48" y="320" width="200" height="280" rx="28" fill="rgba(16,185,129,0.12)" stroke="url(#pmu)" stroke-width="3"/>
    <text x="148" y="420" text-anchor="middle" font-size="72">=</text>
    <text x="148" y="500" text-anchor="middle" fill="#6ee7b7" font-family="system-ui,sans-serif" font-size="28" font-weight="800">PMU</text>
    <text x="148" y="540" text-anchor="middle" fill="#a7f3d0" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Courses &amp; Tiercé</text>
    <text x="148" y="568" text-anchor="middle" fill="#6b7280" font-family="system-ui,sans-serif" font-size="11">Indice Velora</text>
  </g>
  <!-- Carte Foot -->
  <g filter="url(#glow)">
    <rect x="292" y="320" width="200" height="280" rx="28" fill="rgba(6,182,212,0.12)" stroke="url(#foot)" stroke-width="3"/>
    <text x="392" y="420" text-anchor="middle" font-size="72">˝</text>
    <text x="392" y="500" text-anchor="middle" fill="#67e8f9" font-family="system-ui,sans-serif" font-size="28" font-weight="800">FOOT</text>
    <text x="392" y="540" text-anchor="middle" fill="#a5f3fc" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Value Bets &amp; 1N2</text>
    <text x="392" y="568" text-anchor="middle" fill="#6b7280" font-family="system-ui,sans-serif" font-size="11">Radar premium</text>
  </g>
  <!-- Lien central -->
  <circle cx="270" cy="460" r="36" fill="#0f172a" stroke="rgba(251,191,36,0.5)" stroke-width="2"/>
  <text x="270" y="472" text-anchor="middle" font-size="28">=Q</text>
  <!-- Bas -->
  <rect x="80" y="660" width="380" height="4" rx="2" fill="rgba(52,211,153,0.25)"/>
  <rect x="80" y="660" width="190" height="4" rx="2" fill="#10b981"/>
  <rect x="270" y="660" width="190" height="4" rx="2" fill="#22d3ee"/>
  <text x="270" y="720" text-anchor="middle" fill="#d1d5db" font-family="system-ui,sans-serif" font-size="16" font-weight="600">Pronostics algorithmiques</text>
  <text x="270" y="752" text-anchor="middle" fill="#6b7280" font-family="system-ui,sans-serif" font-size="13">Paris hippiques &amp; sportifs · temps réel</text>
</svg>
