# Scraper Winamax + résolution PMU (Supabase) + Foot (JSON) + publish communauté
name: Velora Auto-Sniper & Archiver

on:
  schedule:
    - cron: "0 */2 * * *"
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  VELORA_SKIP_GIT_PUSH: "1"
  PYTHONIOENCODING: utf-8
  VELORA_WEB_DIR: ${{ github.workspace }}/web

jobs:
  velora-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Installer Chromium (Playwright)
        run: playwright install --with-deps chromium

      - name: Exécuter run_all.py
        run: python run_all.py
