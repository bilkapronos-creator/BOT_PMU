# Scraper Winamax + résolution PMU (Supabase) + Foot (JSON) + publish communauté
name: Velora Auto-Sniper & Archiver

on:
  schedule:
    # Toutes les 30 min (équilibre réactivité / quota minutes GitHub Actions)
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHONIOENCODING: utf-8
  VELORA_WEB_DIR: ${{ github.workspace }}/web
  VELORA_HEADLESS: "0"
  # Runners GitHub = IP hors France → géoblocage Winamax sans proxy
  VELORA_CI_SCRAPER_OPTIONAL: "1"
  # Skip scrape seulement si JSON < 6 h ET matchs betting_day (voir run_all._json_skip_scraper_ci)
  VELORA_CI_SCRAPER_MAX_AGE_H: "6"
  VELORA_PROXY_INTERACTIVE: "0"
  VELORA_DUMP_WAIT_MS: "90000"

jobs:
  velora-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Installer dépendances et Chromium Playwright
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Préparer Xvfb (affichage virtuel Linux)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb

      - name: Vérifier Chromium (sans headless-shell)
        run: |
          xvfb-run -a python - <<'PY'
          from playwright.sync_api import sync_playwright
          with sync_playwright() as p:
              b = p.chromium.launch(
                  headless=False,
                  args=["--no-sandbox", "--disable-dev-shm-usage"],
              )
              b.close()
          print("[CI] Playwright Chromium OK (headless=False + xvfb)")
          PY

      - name: Configurer Git (commit bot Actions)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Exécuter run_all.py (xvfb + Chromium classique)
        env:
          VELORA_HEADLESS: "0"
          VELORA_SKIP_GIT_PUSH: "1"
          # Secret repo (Settings → Secrets) : URL proxy France, ex. http://user:pass@host:port
          VELORA_PROXY_URL: ${{ secrets.VELORA_PROXY_URL }}
          # football-data.org — en-tête X-Auth-Token (plan gratuit)
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          VELORA_PARSER_HORIZON_MODE: betting_day
          VELORA_BETTING_DAY_END_HOUR: "8"
        run: xvfb-run -a python run_all.py

      - name: Commit et push JSON (web/ + racine → Vercel)
        if: success()
        run: |
          set -e
          added=0
          for f in \
            api_velora_matchs.json \
            api_velora_premium.json \
            web/api_velora_matchs.json \
            web/api_velora_premium.json \
            web/api_velora_communaute.json \
            web/velora_archives_foot.json \
            web/velora_foot_resultats.json \
            web/velora_odds_history.json \
            web/velora_foot_calibration.json; do
            if [ -f "$f" ]; then
              git add -f "$f"
              added=1
            fi
          done
          if [ "$added" -eq 0 ]; then
            echo "Aucun fichier JSON trouvé après le pipeline."
            exit 1
          fi
          if git diff --staged --quiet; then
            echo "JSON inchangés — pas de push."
            exit 0
          fi
          git commit -m "ci: mise à jour JSON Velora (matchs, premium, archives)"
          git push origin HEAD:main
