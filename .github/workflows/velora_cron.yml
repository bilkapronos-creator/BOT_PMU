# Scraper Winamax + résolution PMU (Supabase) + Foot (JSON) + publish communauté
name: Velora Auto-Sniper & Archiver

on:
  schedule:
    - cron: "0 */2 * * *"
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  VELORA_SKIP_GIT_PUSH: "1"
  PYTHONIOENCODING: utf-8
  VELORA_WEB_DIR: ${{ github.workspace }}/web
  VELORA_HEADLESS: "0"
  # Runners GitHub = IP hors France → géoblocage Winamax sans proxy
  VELORA_CI_SCRAPER_OPTIONAL: "1"
  VELORA_CI_SCRAPER_MAX_AGE_H: "72"
  VELORA_DUMP_WAIT_MS: "90000"

jobs:
  velora-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Installer dépendances et Chromium Playwright
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Préparer Xvfb (affichage virtuel Linux)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb

      - name: Vérifier Chromium (sans headless-shell)
        run: |
          xvfb-run -a python - <<'PY'
          from playwright.sync_api import sync_playwright
          with sync_playwright() as p:
              b = p.chromium.launch(
                  headless=False,
                  args=["--no-sandbox", "--disable-dev-shm-usage"],
              )
              b.close()
          print("[CI] Playwright Chromium OK (headless=False + xvfb)")
          PY

      - name: Exécuter run_all.py (xvfb + Chromium classique)
        env:
          VELORA_HEADLESS: "0"
          # Secret repo (Settings → Secrets) : URL proxy France, ex. http://user:pass@host:port
          VELORA_PROXY_URL: ${{ secrets.VELORA_PROXY_URL }}
        run: xvfb-run -a python run_all.py
