# Scraper Winamax + résolution PMU (Supabase) + Foot (JSON) + publish communauté
name: Velora Auto-Sniper & Archiver

on:
  schedule:
    # Décalés (pas :00) — GitHub Actions reporte/saute souvent les crons à l'heure pile
    - cron: "12 * * * *"
    - cron: "27 * * * *"
    - cron: "42 * * * *"
    - cron: "57 * * * *"
  push:
    branches: [main]
    paths:
      - "run_all.py"
      - "winamax_dump.py"
      - "winamax_sniper.py"
      - "parser_winamax.py"
      - "parser_winamax_tennis.py"
      - ".github/workflows/velora_cron.yml"
      - "velora_engine/**"
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHONIOENCODING: utf-8
  VELORA_WEB_DIR: ${{ github.workspace }}/web
  VELORA_HEADLESS: "0"
  # Runners GitHub = IP hors France → géoblocage Winamax sans proxy
  VELORA_CI_SCRAPER_OPTIONAL: "1"
  # Skip scrape seulement si JSON/dump < 2 h ET matchs du jour encore à jouer
  VELORA_CI_SCRAPER_MAX_AGE_H: "2"
  VELORA_PROXY_INTERACTIVE: "0"
  VELORA_DUMP_WAIT_MS: "90000"

jobs:
  velora-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: velora-pipeline-main
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Installer dépendances et Chromium Playwright
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Préparer Xvfb (affichage virtuel Linux)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb

      - name: Vérifier Chromium (sans headless-shell)
        run: |
          xvfb-run -a python - <<'PY'
          from playwright.sync_api import sync_playwright
          with sync_playwright() as p:
              b = p.chromium.launch(
                  headless=False,
                  args=["--no-sandbox", "--disable-dev-shm-usage"],
              )
              b.close()
          print("[CI] Playwright Chromium OK (headless=False + xvfb)")
          PY

      - name: Configurer Git (commit bot Actions)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Diagnostic proxy (secret présent, sans afficher les identifiants)
        env:
          VELORA_PROXY_URL: ${{ secrets.VELORA_PROXY_URL }}
        run: |
          python - <<'PY'
          import os
          from urllib.parse import urlparse

          url = os.environ.get("VELORA_PROXY_URL", "").strip()
          if not url:
              print("::warning::VELORA_PROXY_URL vide — géoblocage Winamax probable (runner US).")
          else:
              p = urlparse(url)
              port = p.port or "défaut 6645"
              auth = "oui" if p.username or os.environ.get("VELORA_PROXY_USER") else "non"
              print(f"[CI] VELORA_PROXY_URL OK — host={p.hostname} port={port} auth={auth}")
          PY

      - name: Exécuter run_all.py (xvfb + Chromium classique)
        env:
          VELORA_HEADLESS: "0"
          VELORA_SKIP_GIT_PUSH: "1"
          VELORA_PROXY_URL: ${{ secrets.VELORA_PROXY_URL }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          VELORA_PARSER_HORIZON_MODE: rolling
          VELORA_PARSER_HORIZON_HOURS: "168"
          VELORA_BETTING_DAY_END_HOUR: "8"
          VELORA_DUMP_TENNIS_POLL_SEC: "50"
          SNIPER_WINDOW_HOURS: "168"
          VELORA_CI_MATCHS_MAX_AGE_H: "6"
        run: xvfb-run -a python run_all.py

      - name: Vérifier matchs du jour (recherche Foot vide si 0)
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from parser_winamax import is_kickoff_in_betting_day
          from run_all import (
              _dump_contient_match_journee_pari,
              _dump_contient_matchs_a_venir,
              _json_matchs_a_venir_count,
              _match_kickoff_paris,
          )

          dump = Path("dump_winamax_html.json")
          if dump.is_file():
              jour_dump = _dump_contient_match_journee_pari(dump)
              print(f"{dump}: journée de paris={'oui' if jour_dump else 'non'}")
              if not jour_dump:
                  print(
                      "::warning::Dump Winamax sans match du jour — scrape périmé ou échoué."
                  )
              raw_dump = json.loads(dump.read_text(encoding="utf-8"))
              tennis_dump = sum(
                  1
                  for m in (raw_dump.get("matches") or {}).values()
                  if isinstance(m, dict) and m.get("sportId") == 5
              )
              print(f"{dump}: {tennis_dump} match(s) tennis (sportId=5)")
              if tennis_dump == 0:
                  print(
                      "::warning::Dump sans tennis — sports/5 non scrapé. "
                      "Vérifier logs winamax_dump et VELORA_PROXY_URL."
                  )

          paths = [
              Path("api_velora_matchs.json"),
              Path("web/api_velora_matchs.json"),
          ]
          for path in paths:
              if not path.is_file():
                  continue
              raw = json.loads(path.read_text(encoding="utf-8"))
              matchs = raw if isinstance(raw, list) else raw.get("matchs") or []
              jour = sum(
                  1
                  for m in matchs
                  if isinstance(m, dict)
                  and _match_kickoff_paris(m)
                  and is_kickoff_in_betting_day(_match_kickoff_paris(m))
              )
              a_venir = _json_matchs_a_venir_count(path)
              print(f"{path}: {len(matchs)} match(s), {jour} dans la journée de paris, {a_venir} à venir")
              if matchs and a_venir == 0:
                  print(
                      "::error::Aucun match Foot à venir — recherche et Voir tous vides. "
                      "Vérifier VELORA_PROXY_URL (proxy France) et les logs winamax_dump."
                  )
                  raise SystemExit(1)
              elif matchs and jour == 0:
                  print(
                      "::warning::Aucun match du jour — recherche Foot vide. "
                      "Vérifier VELORA_PROXY_URL (proxy France) si le scrape a échoué."
                  )

          tennis_paths = [
              Path("api_velora_matchs_tennis.json"),
              Path("web/api_velora_matchs_tennis.json"),
          ]
          for path in tennis_paths:
              if not path.is_file():
                  continue
              raw = json.loads(path.read_text(encoding="utf-8"))
              n = int((raw.get("meta") or {}).get("match_count") or len(raw.get("matchs") or []))
              print(f"{path}: {n} match(s) tennis")
              if n == 0:
                  print(
                      "::warning::JSON tennis vide — onglet Tennis inactif. "
                      "Le dump doit contenir sportId=5."
                  )
          PY

      - name: Commit et push JSON (web/ + racine → Vercel)
        if: success()
        run: |
          set -e
          git fetch origin main
          git merge --ff-only origin/main
          added=0
          for f in \
            api_velora_matchs.json \
            api_velora_matchs_tennis.json \
            api_velora_premium.json \
            dump_winamax_html.json \
            web/api_velora_matchs.json \
            web/api_velora_matchs_tennis.json \
            web/api_velora_premium.json \
            web/api_velora_communaute.json \
            web/velora_archives_foot.json \
            web/velora_foot_resultats.json \
            web/velora_odds_history.json \
            web/velora_foot_calibration.json \
            web/velora_pronos_history.json; do
            if [ -f "$f" ]; then
              git add -f "$f"
              added=1
            fi
          done
          if [ "$added" -eq 0 ]; then
            echo "Aucun fichier JSON trouvé après le pipeline."
            exit 1
          fi
          if git diff --staged --quiet; then
            echo "JSON inchangés — pas de push."
            exit 0
          fi
          git commit -m "ci: mise à jour JSON Velora (matchs, premium, archives)"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "Push réussi (tentative ${attempt})."
              exit 0
            fi
            echo "Push refusé (tentative ${attempt}/3) — rebase sur origin/main…"
            git fetch origin main
            git rebase origin/main
            sleep $((attempt * 2))
          done
          echo "::error::git push échoué après 3 tentatives (conflit ou permissions)."
          exit 1
